name: publish-data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"
    - cron: "55 2 * * *"

permissions:
  contents: write

concurrency:
  group: publish-data-workflow-${{ github.ref }}
  cancel-in-progress: false

env:
  PUBLISH_BRANCH: data-publish
  PRIMARY_BRANCH: main

jobs:
  ensure-publish-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.PRIMARY_BRANCH }}

      - name: Ensure publish branch exists and includes latest primary branch changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${PRIMARY_BRANCH}" "${PUBLISH_BRANCH}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${PUBLISH_BRANCH}"; then
            git switch --create "${PUBLISH_BRANCH}" "origin/${PUBLISH_BRANCH}"
          else
            git switch --create "${PUBLISH_BRANCH}" "origin/${PRIMARY_BRANCH}"
          fi

          git merge --no-edit "origin/${PRIMARY_BRANCH}"
          git push origin HEAD:"${PUBLISH_BRANCH}"

  publish-decklists:
    needs: ensure-publish-branch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '15 * * * *' }}
    strategy:
      fail-fast: false
      matrix:
        format: [Modern, Standard, Pioneer, Legacy, Vintage, Pauper]
    runs-on: ubuntu-latest
    env:
      PUBLISH_OUTPUT_ROOT: data
      PUBLISH_RETENTION_DAYS: "7"
      PUBLISH_DECK_DOWNLOAD_DELAY_SECONDS: "3"
      TZ: America/Sao_Paulo
    concurrency:
      group: publish-data-decklists-${{ github.ref }}-${{ matrix.format }}
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.PUBLISH_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Publish deck-text snapshots
        id: publish
        run: |
          set +e
          python -m publisher.runner \
            --output-root "$PUBLISH_OUTPUT_ROOT" \
            --retention-days "$PUBLISH_RETENTION_DAYS" \
            scrape-deck-texts \
            --format "${{ matrix.format }}" \
            --deck-download-delay-seconds "$PUBLISH_DECK_DOWNLOAD_DELAY_SECONDS" \
            --days "$PUBLISH_RETENTION_DAYS"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Package format artifact
        if: always()
        env:
          MATRIX_FORMAT: ${{ matrix.format }}
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          from publisher.layout import normalize_name

          data_root = Path(os.environ["PUBLISH_OUTPUT_ROOT"])
          artifact_root = Path("artifact")
          normalized_format = normalize_name(os.environ["MATRIX_FORMAT"])
          artifact_root.mkdir(parents=True, exist_ok=True)

          def copy_path(path: Path) -> None:
              if not path.exists():
                  return
              if path.is_dir():
                  for child in path.rglob("*"):
                      if child.is_file():
                          destination = artifact_root / child.relative_to(data_root)
                          destination.parent.mkdir(parents=True, exist_ok=True)
                          shutil.copy2(child, destination)
                  return
              destination = artifact_root / path.relative_to(data_root)
              destination.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(path, destination)

          copy_path(data_root / "latest" / "archetypes" / f"{normalized_format}.json")
          copy_path(data_root / "latest" / "decks" / normalized_format)
          copy_path(data_root / "latest" / "runs" / f"scrape-deck-texts-{normalized_format}.json")
          copy_path(data_root / "archive" / "deck-texts" / normalized_format)

          metadata_path = artifact_root / ".artifact-format"
          metadata_path.write_text(f"{normalized_format}\n", encoding="utf-8")
          PY

      - name: Upload format artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-data-decklists-${{ matrix.format }}
          path: artifact
          if-no-files-found: error

      - name: Summarize run manifest
        if: always()
        env:
          MATRIX_FORMAT: ${{ matrix.format }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from publisher.layout import normalize_name

          data_root = Path(os.environ["PUBLISH_OUTPUT_ROOT"])
          normalized_format = normalize_name(os.environ["MATRIX_FORMAT"])
          run_manifest_path = (
              data_root / "latest" / "runs" / f"scrape-deck-texts-{normalized_format}.json"
          )
          if not run_manifest_path.exists():
              print(f"Run manifest not found: {run_manifest_path}")
              raise SystemExit(0)

          payload = json.loads(run_manifest_path.read_text(encoding="utf-8"))
          print(
              json.dumps(
                  {
                      "path": run_manifest_path.as_posix(),
                      "status": payload.get("status"),
                      "summary": payload.get("summary", {}),
                  },
                  indent=2,
              )
          )

          failures = [
              result for result in payload.get("results", []) if result.get("status") == "hard-failure"
          ]
          if failures:
              print("Hard failures:")
              for failure in failures[:20]:
                  print(json.dumps(failure, sort_keys=True))
              if len(failures) > 20:
                  print(f"... {len(failures) - 20} additional hard failures omitted")
          PY

      - name: Fail if freshness guarantees were violated
        if: steps.publish.outputs.exit_code != '0'
        run: |
          echo "Publisher exited with code ${{ steps.publish.outputs.exit_code }}."
          exit 1

  fetch-mtgo-index:
    needs: ensure-publish-branch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '15 * * * *' }}
    runs-on: ubuntu-latest
    env:
      PUBLISH_RETENTION_DAYS: "7"
      MTGO_DECKLISTS_ENABLED: "true"
      TZ: America/Sao_Paulo
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.PUBLISH_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Fetch MTGO decklist index pages
        run: |
          python -m publisher.runner \
            --output-root data \
            --retention-days "$PUBLISH_RETENTION_DAYS" \
            scrape-mtgo-index \
            --days "$PUBLISH_RETENTION_DAYS" \
            --output-file artifact/mtgo-index.json

