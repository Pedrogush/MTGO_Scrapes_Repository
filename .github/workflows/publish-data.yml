      TZ: America/Sao_Paulo
    concurrency:
      group: publish-data-mtgo-decklists-${{ github.ref }}-${{ matrix.format }}
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
