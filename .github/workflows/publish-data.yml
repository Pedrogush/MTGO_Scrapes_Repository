                          destination = artifact_root / child.relative_to(data_root)
                          destination.parent.mkdir(parents=True, exist_ok=True)
                          shutil.copy2(child, destination)
                  return
              destination = artifact_root / path.relative_to(data_root)
              destination.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(path, destination)

          copy_path(data_root / "latest" / "mtgo-decklists" / f"{normalized_format}.json")
          copy_path(data_root / "latest" / "runs" / f"scrape-mtgo-decklists-{normalized_format}.json")
          copy_path(data_root / "archive" / "mtgo-decklists" / normalized_format)

          metadata_path = artifact_root / ".artifact-format"
          metadata_path.write_text(f"{normalized_format}\n", encoding="utf-8")
          PY

      - name: Upload MTGO artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-data-decklists-mtgo-${{ matrix.format }}
          path: artifact
          if-no-files-found: error

      - name: Summarize MTGO run manifest
        if: always()
        env:
          MATRIX_FORMAT: ${{ matrix.format }}
        run: |
          python - <<'PY'
