  commit-published-data:
    needs:
      - publish-decklists
      - publish-decklists-mtgo
      - publish-metagame
      - publish-radars
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event.schedule == '15 * * * *') }}
    runs-on: ubuntu-latest
    env:
      PUBLISH_OUTPUT_ROOT: data
      PUBLISH_RETENTION_DAYS: "7"
      TZ: America/Sao_Paulo
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.PUBLISH_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Download decklist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: publish-data-decklists-*
          merge-multiple: true
          path: ${{ env.PUBLISH_OUTPUT_ROOT }}

      - name: Download metagame artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: publish-data-metagame-*
          merge-multiple: true
          path: ${{ env.PUBLISH_OUTPUT_ROOT }}

      - name: Download radar artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: publish-data-radars-*
          merge-multiple: true
          path: ${{ env.PUBLISH_OUTPUT_ROOT }}

      - name: Prune retained working tree
        run: |
          python -m publisher.retention \
            --output-root "$PUBLISH_OUTPUT_ROOT" \
            --retention-days "$PUBLISH_RETENTION_DAYS"

      - name: Rebuild latest manifest
        run: |
          python - <<'PY'
          from datetime import UTC, datetime
          import json
          import os
          from pathlib import Path

          from publisher.contracts import build_latest_manifest
          from publisher.layout import normalize_name, write_json

          output_root = Path(os.environ["PUBLISH_OUTPUT_ROOT"])
          retention_days = int(os.environ["PUBLISH_RETENTION_DAYS"])
          generated_at = datetime.now(UTC).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          manifest = build_latest_manifest(generated_at=generated_at, retention_days=retention_days)

          def load_payload(path: Path) -> dict:
              return json.loads(path.read_text(encoding="utf-8"))

          def relative_path(path: Path) -> str:
              return path.relative_to(output_root).as_posix()

          def append_entry(category: str, path: Path, format_value: str | None = None, **extra: str) -> None:
              payload = load_payload(path)
              manifest["latest"][category].append(
                  {
                      "format": format_value or payload.get("format") or path.stem,
                      "path": relative_path(path),
                      "updated_at": payload.get("generated_at", generated_at),
                      **extra,
                  }
              )

          for path in sorted((output_root / "latest" / "archetypes").glob("*.json")):
              append_entry("archetype_lists", path)

          for path in sorted((output_root / "latest" / "decks").rglob("*.json")):
              payload = load_payload(path)
              archetype = payload.get("archetype", {})
              append_entry(
                  "archetype_decks",
                  path,
                  archetype=normalize_name(archetype.get("name", path.stem)),
              )

          for path in sorted((output_root / "latest" / "radars").rglob("*.json")):
              payload = load_payload(path)
              archetype = payload.get("archetype", {})
              append_entry(
                  "archetype_radars",
                  path,
                  archetype=normalize_name(archetype.get("name", path.stem)),
              )

          for path in sorted((output_root / "latest" / "card-pools").glob("*.json")):
              append_entry("format_card_pools", path)

          for path in sorted((output_root / "latest" / "metagame").glob("*.json")):
              append_entry("metagame_daily", path)

          for path in sorted((output_root / "archive" / "deck-texts").rglob("*.json")):
              payload = load_payload(path)
              append_entry(
                  "deck_text_blobs",
                  path,
                  deck_id=str(payload.get("deck_id", path.stem)),
              )

          for path in sorted((output_root / "latest" / "runs").glob("*.json")):
              payload = load_payload(path)
              append_entry(
                  "runs",
                  path,
                  format_value=payload.get("command", path.stem),
              )

          write_json(output_root / "latest" / "latest.json", manifest)
          PY

      - name: Build client bundle
        run: |
          python publisher/client_bundle.py --output-root "$PUBLISH_OUTPUT_ROOT"

      - name: Show bundle size
        run: |
          ls -lh "$PUBLISH_OUTPUT_ROOT/latest/client-bundle.tar.gz"

      - name: Commit changed published data
        run: |
          rm -rf "$PUBLISH_OUTPUT_ROOT/daily" "$PUBLISH_OUTPUT_ROOT/hourly"

          if [ -z "$(git status --porcelain -- "$PUBLISH_OUTPUT_ROOT")" ]; then
            echo "No published data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "$PUBLISH_OUTPUT_ROOT"
          git commit -m "Publish scrape snapshots"

          for attempt in 1 2 3; do
            if git pull --rebase origin "${PUBLISH_BRANCH}" && git push origin HEAD:"${PUBLISH_BRANCH}"; then
              exit 0
            fi

            git rebase --abort || true
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push published data after $attempt attempts."
              exit 1
            fi

            echo "Retrying push after remote updates (attempt $attempt failed)."
            sleep 5
          done

      - name: Fail if any format missed freshness guarantees
        if: ${{ needs.publish-decklists.result != 'success' || needs.publish-decklists-mtgo.result != 'success' || needs.publish-metagame.result != 'success' || needs.publish-radars.result != 'success' }}
        run: |
          echo "One or more publish jobs failed freshness guarantees."
          exit 1

  sync-published-data-to-main:
    needs: ensure-publish-branch
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '55 2 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.PRIMARY_BRANCH }}

      - name: Sync publish branch into primary branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin "${PRIMARY_BRANCH}" "${PUBLISH_BRANCH}"
            git checkout -B sync-target "origin/${PRIMARY_BRANCH}"

            if ! git merge --no-edit "origin/${PUBLISH_BRANCH}"; then
              git merge --abort || true
              echo "Failed to merge ${PUBLISH_BRANCH} into ${PRIMARY_BRANCH}."
              exit 1
            fi

            if git push origin HEAD:"${PRIMARY_BRANCH}"; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push ${PRIMARY_BRANCH} after $attempt attempts."
              exit 1
            fi

            echo "Retrying sync push after remote updates (attempt $attempt failed)."
            sleep 5
          done
