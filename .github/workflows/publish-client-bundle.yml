name: publish-client-bundle

on:
  workflow_dispatch:
  schedule:
    - cron: "30 * * * *"

permissions:
  contents: write

concurrency:
  group: publish-client-bundle-workflow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-client-bundle:
    runs-on: ubuntu-latest
    env:
      PUBLISH_OUTPUT_ROOT: data
      TZ: America/Sao_Paulo
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build client bundle
        run: |
          python publisher/client_bundle.py --output-root "$PUBLISH_OUTPUT_ROOT"

      - name: Show bundle size
        run: |
          ls -lh "$PUBLISH_OUTPUT_ROOT/latest/client-bundle.tar.gz"

      - name: Commit changed client bundle
        run: |
          bundle_path="$PUBLISH_OUTPUT_ROOT/latest/client-bundle.tar.gz"
          if [ -z "$(git status --porcelain -- "$bundle_path")" ]; then
            echo "No client bundle changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$bundle_path"
          git commit -m "Publish client bundle"

          for attempt in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin HEAD:"${GITHUB_REF_NAME}"; then
              exit 0
            fi

            git rebase --abort || true
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to push client bundle after $attempt attempts."
              exit 1
            fi

            echo "Retrying push after remote updates (attempt $attempt failed)."
            sleep 5
          done
