name: Publish Hourly Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

concurrency:
  group: publish-hourly-workflow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-hourly:
    strategy:
      fail-fast: false
      matrix:
        format: [Modern, Standard, Pioneer, Legacy, Vintage, Pauper]
    runs-on: ubuntu-latest
    env:
      PUBLISH_OUTPUT_ROOT: data
      PUBLISH_RETENTION_DAYS: "7"
      PUBLISH_DECK_DOWNLOAD_DELAY_SECONDS: "3"
      TZ: America/Sao_Paulo
    concurrency:
      group: publish-hourly-${{ github.ref }}-${{ matrix.format }}
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Publish hourly deck and deck-text snapshots
        id: publish
        run: |
          set +e
          python -m publisher.runner \
            --output-root "$PUBLISH_OUTPUT_ROOT" \
            --retention-days "$PUBLISH_RETENTION_DAYS" \
            scrape-deck-texts \
            --format "${{ matrix.format }}" \
            --deck-download-delay-seconds "$PUBLISH_DECK_DOWNLOAD_DELAY_SECONDS" \
            --days "$PUBLISH_RETENTION_DAYS"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Prune retained working tree
        run: |
          python -m publisher.retention \
            --output-root "$PUBLISH_OUTPUT_ROOT" \
            --retention-days "$PUBLISH_RETENTION_DAYS"

      - name: Commit changed snapshots
        run: |
          if [ -z "$(git status --porcelain -- "$PUBLISH_OUTPUT_ROOT")" ]; then
            echo "No published data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$PUBLISH_OUTPUT_ROOT"
          git commit -m "Publish hourly scrape snapshots for ${{ matrix.format }}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Fail if freshness guarantees were violated
        if: steps.publish.outputs.exit_code != '0'
        run: |
          echo "Publisher exited with code ${{ steps.publish.outputs.exit_code }}."
          exit 1
